<!DOCTYPE html>
<html>
<head>
    <title>CORS Test</title>
</head>
<body>
    <h1>Testing NPI API CORS</h1>
    <button onclick="testDirectAPI()">Test Direct NPI API (Should Fail)</button>
    <button onclick="testProxyAPI()">Test Proxy API (Should Work)</button>
    <div id="results"></div>

    <script>
        async function testDirectAPI() {
            const results = document.getElementById('results');
            results.innerHTML = '<h3>Testing Direct API...</h3>';
            
            try {
                const response = await fetch('https://npiregistry.cms.hhs.gov/api?version=2.1&limit=10&skip=0&first_name=Jo');
                const data = await response.json();
                results.innerHTML += '<p style="color: green;">✅ Direct API worked! (Unexpected)</p>';
                results.innerHTML += '<pre>' + JSON.stringify(data, null, 2).substring(0, 500) + '...</pre>';
            } catch (error) {
                results.innerHTML += '<p style="color: red;">❌ Direct API failed (Expected): ' + error.message + '</p>';
            }
        }

        async function testProxyAPI() {
            const results = document.getElementById('results');
            results.innerHTML = '<h3>Testing Proxy API...</h3>';
            
            try {
                const response = await fetch('http://localhost:3001/api/npi?version=2.1&limit=10&skip=0&first_name=Jo');
                const data = await response.json();
                results.innerHTML += '<p style="color: green;">✅ Proxy API worked!</p>';
                results.innerHTML += '<p>Found ' + (data.results?.length || 0) + ' doctors</p>';
                results.innerHTML += '<pre>' + JSON.stringify(data, null, 2).substring(0, 500) + '...</pre>';
            } catch (error) {
                results.innerHTML += '<p style="color: red;">❌ Proxy API failed: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
